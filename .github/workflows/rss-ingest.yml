name: NewsFlow RSS Ingest

on:
  schedule:
    # Every 30 minutes. At ~30-60s per run, that's roughly 720-1,440 min/month —
    # comfortably under GitHub's 2,000 free min/month for private repos (and
    # unlimited if this repo is public). Note: GitHub's scheduled triggers are
    # "best effort," not exact — during high platform load a run can slip by
    # 10-20+ minutes past its scheduled time. There's no way around that with
    # GitHub Actions specifically; see the README for the Cloud Scheduler
    # alternative if you need tighter timing guarantees later.
    - cron: '*/30 * * * *'
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install rss-parser firebase-admin --no-save
      - name: Run ingestion
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        run: node scripts/rss-ingest.mjs
