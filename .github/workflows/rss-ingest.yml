name: NewsFlow RSS Ingest

on:
  schedule:
    # Every 2 hours. GitHub Actions free tier: 2,000 min/month on private repos,
    # unlimited on public repos — this job takes seconds per run.
    - cron: '0 */2 * * *'
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install rss-parser firebase-admin --no-save
      - name: Run ingestion
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        run: node scripts/rss-ingest.mjs
